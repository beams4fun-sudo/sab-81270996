<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Access Portal</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body class="portal-container">
    <div class="portal-card">
        <h2 class="portal-title">Steal-a-Brainrot</h2>
        <p class="portal-subtitle">Access Portal Validation</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash-message flash-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="{{ url_for('member.portal') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group" style="text-align: left;">
                <label class="form-label">License Key</label>
                <input type="text" name="key" class="form-input" placeholder="SAB-XXXXXXXXXXXXXXXX" style="font-family: monospace;" required>
            </div>
            <button type="submit" class="btn btn-success" style="width: 100%; margin-top: 1rem;">Validate License</button>
        </form>
    </div>
</body>
</html>
